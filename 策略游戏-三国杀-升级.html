<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简版三国杀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0a0a;font-family:'Microsoft YaHei','SimHei',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;user-select:none}
#G{width:1100px;height:720px;position:relative;background:linear-gradient(180deg,#2a1a0a,#1a0a05);border-radius:16px;box-shadow:0 0 60px rgba(139,69,19,.3);overflow:hidden}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;opacity:.04;background-image:repeating-linear-gradient(45deg,transparent,transparent 40px,#daa520 40px,#daa520 41px);pointer-events:none}

/* AI area */
#ai-area{position:absolute;top:0;left:0;right:0;height:180px;display:flex;padding:10px 20px;gap:10px}
#ai-info{flex-shrink:0}
#ai-hand{flex:1;display:flex;justify-content:center;padding-top:10px}
.cb{width:48px;height:68px;background:linear-gradient(135deg,#8b0000,#5c0000);border:2px solid #daa520;border-radius:5px;margin-left:-10px;box-shadow:0 2px 6px rgba(0,0,0,.4);position:relative}
.cb::after{content:'三';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#daa520;font-size:20px;font-weight:bold;opacity:.6}

/* Center */
#center{position:absolute;top:185px;left:0;right:0;height:160px;display:flex;justify-content:center;align-items:center;gap:20px;padding:0 20px}
#play-zone{min-width:180px;min-height:120px;border:2px dashed rgba(218,165,32,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;position:relative}
#play-zone .lbl{position:absolute;top:-18px;color:#daa520;font-size:11px;opacity:.4}
#log{width:340px;height:130px;overflow-y:auto;padding:8px 10px;background:rgba(0,0,0,.3);border:1px solid rgba(218,165,32,.12);border-radius:8px;font-size:12px;line-height:1.6;color:#cba}
#log .a{color:#ff6b6b}#log .d{color:#6bafff}#log .p{color:#ff6baa}#log .i{color:#daa520}#log .w{color:#ffd700;font-weight:bold}

/* Player area */
#pl-area{position:absolute;bottom:0;left:0;right:0;height:370px;display:flex;flex-direction:column}
#pl-hand{flex:1;display:flex;justify-content:center;align-items:flex-end;padding:0 20px 6px;gap:3px;flex-wrap:wrap;min-height:130px}
#pl-ctrl{display:flex;justify-content:center;align-items:center;gap:12px;padding:8px 20px 14px;flex-shrink:0}

/* Cards */
.card{width:78px;height:108px;border-radius:7px;position:relative;cursor:pointer;transition:all .15s;box-shadow:0 3px 8px rgba(0,0,0,.5);flex-shrink:0}
.card:hover{transform:translateY(-14px);box-shadow:0 8px 18px rgba(0,0,0,.6)}
.card.sel{transform:translateY(-22px)!important;box-shadow:0 0 18px rgba(255,215,0,.6)!important;outline:2px solid #ffd700}
.card.off{opacity:.35;cursor:not-allowed}
.card.off:hover{transform:none}
.cn{position:absolute;bottom:0;left:0;width:100%;text-align:center;padding:5px 2px;font-size:12px;font-weight:bold;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);border-radius:0 0 6px 6px}
.ct{position:absolute;top:3px;left:5px;font-size:9px;color:rgba(255,255,255,.6)}
.ci{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:30px;opacity:.75}
.c-atk{background:linear-gradient(160deg,#b22222,#8b0000);border:2px solid #cd5c5c}
.c-def{background:linear-gradient(160deg,#1e5a8c,#0d3b66);border:2px solid #4682b4}
.c-hea{background:linear-gradient(160deg,#c4507a,#8b2252);border:2px solid #db7093}
.c-tri{background:linear-gradient(160deg,#6b5b3a,#4a3f28);border:2px solid #daa520}
.c-aoe{background:linear-gradient(160deg,#2d6b2d,#1a4a1a);border:2px solid #4caf50}

/* Portrait */
.pbox{background:linear-gradient(135deg,#3a2a1a,#2a1a0a);border:2px solid #daa520;border-radius:10px;padding:10px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.5)}
.pbox.enemy{background:linear-gradient(135deg,#2a1a2a,#1a0a1a);border-color:#8b0000}
.pav{width:75px;height:75px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:38px;border:3px solid #daa520;box-shadow:0 0 12px rgba(218,165,32,.25)}
.pbox.enemy .pav{border-color:#8b0000;box-shadow:0 0 12px rgba(139,0,0,.25)}
.pn{font-size:15px;font-weight:bold;color:#ffd700;margin-bottom:2px}
.pt{font-size:10px;color:#aa8;margin-bottom:5px}
.hp{display:flex;gap:2px;justify-content:center;margin-bottom:3px}
.hp i{width:15px;height:15px;border-radius:3px;background:#c62828;border:1px solid #e53935;display:inline-block}
.hp i.x{background:#333;border-color:#444}
.sk{font-size:9px;color:#ffa;background:rgba(218,165,32,.12);padding:2px 5px;border-radius:3px;display:inline-block;margin-top:3px}

/* Buttons */
.btn{padding:10px 26px;border:2px solid;border-radius:7px;font-size:14px;font-weight:bold;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:hover:not(:disabled){transform:scale(1.05)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.b-atk{background:linear-gradient(135deg,#b22222,#8b0000);border-color:#cd5c5c;color:#fff}
.b-end{background:linear-gradient(135deg,#5a4a2a,#3a2a1a);border-color:#8a7a5a;color:#daa520}
.b-def{background:linear-gradient(135deg,#1e5a8c,#0d3b66);border-color:#4682b4;color:#fff}
.b-go{background:linear-gradient(135deg,#daa520,#b8860b);border-color:#ffd700;color:#1a0a0a}

/* Overlay */
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:12px;pointer-events:none}
#overlay>*{pointer-events:auto}
#overlay h2{color:#ffd700;font-size:22px;text-shadow:0 0 10px rgba(218,165,32,.5)}
#overlay .hint{color:#cba;font-size:13px}

/* Turn & deck */
#info-bar{position:absolute;top:178px;left:0;right:0;display:flex;justify-content:space-between;padding:0 20px;font-size:12px;color:#887}

/* ========== Menu (古典国风改造) ========== */
#menu{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;overflow:hidden;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(180,60,30,.25), transparent 55%),
    radial-gradient(ellipse at 85% 90%, rgba(120,30,20,.3), transparent 50%),
    radial-gradient(ellipse at 50% 50%, #3a1a0a 0%, #1a0805 70%, #0a0302 100%);
  font-family:"STKaiti","KaiTi","FangSong","STFangsong","Microsoft YaHei",serif;
}
/* 水墨纹理 + 网格残卷 */
#menu::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:.18;mix-blend-mode:screen;
  background-image:
    radial-gradient(circle at 30% 20%, rgba(255,200,140,.15) 0, transparent 40%),
    radial-gradient(circle at 70% 80%, rgba(200,80,40,.12) 0, transparent 40%);
}
#menu::after{content:'';position:absolute;inset:0;pointer-events:none;opacity:.05;
  background-image:repeating-linear-gradient(0deg,transparent 0 38px,rgba(218,165,32,.4) 38px 39px),
                   repeating-linear-gradient(90deg,transparent 0 38px,rgba(218,165,32,.4) 38px 39px);
}

/* 飘落篆字层 */
#menu-fall{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.fchar{position:absolute;top:-40px;color:rgba(218,165,32,.22);font-size:26px;font-family:"STKaiti","KaiTi",serif;font-weight:bold;
  text-shadow:0 0 8px rgba(218,165,32,.3);
  animation:fallDown linear infinite;
}
@keyframes fallDown{
  0%{transform:translateY(-60px) rotate(-8deg);opacity:0}
  10%{opacity:.7}
  90%{opacity:.5}
  100%{transform:translateY(780px) rotate(12deg);opacity:0}
}

/* 火星层 */
#menu-spark{position:absolute;inset:0;pointer-events:none;z-index:1}
.spark{position:absolute;width:3px;height:3px;border-radius:50%;background:#ffb968;
  box-shadow:0 0 6px 2px rgba(255,160,80,.8),0 0 12px 4px rgba(255,80,30,.4);
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  0%{transform:translateY(0) translateX(0) scale(.6);opacity:0}
  15%{opacity:1}
  85%{opacity:.8}
  100%{transform:translateY(-720px) translateX(var(--dx,30px)) scale(.2);opacity:0}
}

/* 内容容器 */
.menu-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;padding:0 30px;animation:menuFadeIn .8s ease-out}
@keyframes menuFadeIn{from{opacity:0}to{opacity:1}}

/* 顶部小印章 */
.menu-stamp{display:flex;align-items:center;gap:14px;margin-bottom:6px;opacity:0;animation:dropIn .7s .2s ease-out forwards}
.menu-stamp .line{width:80px;height:1px;background:linear-gradient(90deg,transparent,#8a5a2a,transparent)}
.menu-stamp .seal{width:34px;height:34px;border:2px solid #c0392b;background:rgba(192,57,43,.15);color:#e74c3c;font-size:14px;font-weight:bold;display:flex;align-items:center;justify-content:center;font-family:"STKaiti",serif;transform:rotate(-4deg);box-shadow:0 0 12px rgba(192,57,43,.4)}

/* 主标题 */
#menu h1{font-family:"STKaiti","KaiTi","STSong",serif;font-size:96px;font-weight:bold;letter-spacing:24px;margin:0 0 0 24px;line-height:1;
  background:linear-gradient(180deg,#ffe89a 0%,#daa520 45%,#b8860b 70%,#8b5a1a 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 40px rgba(218,165,32,.4);
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.6));
  position:relative;opacity:0;animation:titleIn 1.1s .4s cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes titleIn{
  0%{opacity:0;letter-spacing:60px;filter:blur(20px) drop-shadow(0 4px 12px rgba(0,0,0,.6))}
  60%{opacity:1;filter:blur(0) drop-shadow(0 4px 12px rgba(0,0,0,.6))}
  100%{opacity:1;letter-spacing:24px}
}
/* 标题描边层 */
.title-wrap{position:relative;display:inline-block}
.title-stroke{position:absolute;top:0;left:24px;font-family:"STKaiti","KaiTi",serif;font-size:96px;font-weight:bold;letter-spacing:24px;line-height:1;
  color:transparent;-webkit-text-stroke:1px rgba(255,180,80,.35);
  pointer-events:none;animation:strokeBreath 3s ease-in-out infinite}
@keyframes strokeBreath{0%,100%{opacity:.4}50%{opacity:.85}}
/* 副标题与分隔 */
.menu-deco{display:flex;align-items:center;gap:18px;margin-top:18px;opacity:0;animation:dropIn .7s 1.1s ease-out forwards}
.menu-deco .swirl{font-size:14px;color:#8a5a2a}
.menu-deco .sub{color:#c8a878;font-size:13px;letter-spacing:8px;font-family:"STFangsong","FangSong",serif}
@keyframes dropIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* 引导文字 */
.menu-guide{margin:28px 0 14px;color:#a08868;font-size:12px;letter-spacing:6px;opacity:0;animation:dropIn .6s 1.4s ease-out forwards;
  display:flex;align-items:center;gap:12px}
.menu-guide::before,.menu-guide::after{content:'';width:36px;height:1px;background:linear-gradient(90deg,transparent,#8a5a2a,transparent)}

/* 武将卡列表 */
.hlist{display:flex;gap:12px;margin-bottom:8px;opacity:0;animation:dropIn .8s 1.5s ease-out forwards}
.hcard{width:152px;padding:16px 12px 14px;text-align:center;cursor:pointer;
  background:linear-gradient(165deg,rgba(60,40,22,.95),rgba(34,20,10,.95));
  border:1px solid rgba(218,165,32,.35);border-radius:4px;
  position:relative;transition:transform .35s cubic-bezier(.2,.9,.3,1.2),box-shadow .35s,border-color .35s;
  box-shadow:0 4px 12px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,200,120,.06);
  transform-style:preserve-3d;
}
/* 卡片角饰 */
.hcard::before,.hcard::after{content:'';position:absolute;width:12px;height:12px;border:1px solid rgba(218,165,32,.5);pointer-events:none}
.hcard::before{top:5px;left:5px;border-right:none;border-bottom:none}
.hcard::after{bottom:5px;right:5px;border-left:none;border-top:none}
.hcard .corner-tr,.hcard .corner-bl{position:absolute;width:12px;height:12px;border:1px solid rgba(218,165,32,.5);pointer-events:none}
.hcard .corner-tr{top:5px;right:5px;border-left:none;border-bottom:none}
.hcard .corner-bl{bottom:5px;left:5px;border-right:none;border-top:none}

.hcard:hover{transform:translateY(-10px) rotateX(4deg);border-color:#daa520;box-shadow:0 14px 28px rgba(0,0,0,.6),0 0 22px rgba(218,165,32,.25),inset 0 0 0 1px rgba(255,200,120,.15)}
.hcard.pick{border-color:#ffd700;background:linear-gradient(165deg,rgba(80,55,28,.95),rgba(50,28,12,.95));
  box-shadow:0 0 0 1px #ffd700,0 0 24px rgba(255,215,0,.4),0 8px 20px rgba(0,0,0,.5);
  transform:translateY(-6px)}
.hcard.pick::after{content:'选';position:absolute;bottom:5px;right:5px;width:22px;height:22px;border:1px solid #c0392b;background:rgba(192,57,43,.3);color:#ff6b5e;font-size:13px;display:flex;align-items:center;justify-content:center;border-radius:2px;transform:rotate(-6deg)}

.hcard .av{font-size:54px;margin-bottom:6px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.hcard .hn{font-size:22px;font-weight:bold;color:#ffd87a;margin-bottom:3px;font-family:"STKaiti","KaiTi",serif;letter-spacing:3px;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.hcard .ht{font-size:12px;color:#a89070;margin-bottom:8px;letter-spacing:1px}
.hcard .hs{font-size:13px;color:#ffd87a;border:1px solid rgba(218,165,32,.4);padding:2px 10px;border-radius:0;display:inline-block;font-family:"STKaiti",serif;letter-spacing:3px;background:rgba(40,20,8,.4)}
.hcard .hd{font-size:11px;color:#b09878;margin-top:7px;line-height:1.5;letter-spacing:.5px}
.hcard .hp-pip{display:flex;justify-content:center;gap:3px;margin-top:7px}
.hcard .hp-pip i{width:8px;height:8px;border-radius:50%;background:#c0392b;box-shadow:0 0 4px rgba(192,57,43,.6)}

/* VS 对阵区 */
.vs-zone{display:flex;align-items:center;justify-content:center;gap:24px;margin:18px 0 6px;opacity:0;animation:dropIn .6s 1.7s ease-out forwards;min-height:78px}
.vs-side{display:flex;align-items:center;gap:10px;padding:8px 14px;border:1px solid rgba(218,165,32,.25);background:rgba(20,10,5,.4);min-width:200px}
.vs-side.you{justify-content:flex-end}
.vs-side.foe{justify-content:flex-start}
.vs-side .vs-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid;flex-shrink:0}
.vs-side.you .vs-av{border-color:#daa520;background:radial-gradient(circle,rgba(218,165,32,.2),transparent);box-shadow:0 0 12px rgba(218,165,32,.3)}
.vs-side.foe .vs-av{border-color:#c0392b;background:radial-gradient(circle,rgba(192,57,43,.2),transparent);box-shadow:0 0 12px rgba(192,57,43,.3)}
.vs-side .vs-info{font-size:12px;line-height:1.4;font-family:"STKaiti",serif}
.vs-side.you .vs-info{text-align:right}
.vs-side .vs-name{color:#ffd87a;font-size:15px;font-weight:bold;letter-spacing:2px}
.vs-side .vs-title{color:#9a8060;font-size:10px;letter-spacing:1px}
.vs-side .vs-empty{color:#5a4a30;font-size:12px;letter-spacing:3px;font-style:italic}

.vs-mid{position:relative;width:64px;height:64px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vs-mid .vs-text{font-family:"STKaiti","KaiTi",serif;font-size:32px;font-weight:bold;
  background:linear-gradient(180deg,#ffe89a,#c0392b);-webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 16px rgba(192,57,43,.6);letter-spacing:-2px;
  animation:vsBeat 1.4s ease-in-out infinite}
@keyframes vsBeat{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.vs-mid::before{content:'';position:absolute;inset:-6px;border:1px solid rgba(192,57,43,.3);border-radius:50%;animation:ringRot 6s linear infinite}
.vs-mid::after{content:'';position:absolute;inset:-12px;border:1px dashed rgba(218,165,32,.25);border-radius:50%;animation:ringRot 12s linear infinite reverse}
@keyframes ringRot{to{transform:rotate(360deg)}}

/* 开始按钮 */
.sbtn{position:relative;padding:14px 70px;border:none;font-size:20px;font-weight:bold;cursor:pointer;font-family:"STKaiti","KaiTi",serif;letter-spacing:14px;text-indent:14px;
  background:linear-gradient(180deg,#daa520 0%,#b8860b 50%,#8b5a1a 100%);
  color:#1a0a05;
  border-radius:0;
  clip-path:polygon(12px 0,calc(100% - 12px) 0,100% 50%,calc(100% - 12px) 100%,12px 100%,0 50%);
  box-shadow:0 6px 18px rgba(0,0,0,.5),0 0 20px rgba(218,165,32,.3);
  transition:all .3s;opacity:0;animation:dropIn .6s 1.9s ease-out forwards;overflow:hidden}
.sbtn::before{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.5) 50%,transparent 65%);transform:translateX(-100%);transition:transform .6s}
.sbtn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 32px rgba(255,215,0,.5)}
.sbtn:hover:not(:disabled)::before{transform:translateX(100%)}
.sbtn:disabled{opacity:.35;cursor:not-allowed;filter:grayscale(.6)}
.sbtn-wrap{position:relative;display:inline-block;margin-top:6px}
.sbtn-wrap::before,.sbtn-wrap::after{content:'';position:absolute;top:50%;width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(218,165,32,.6),transparent)}
.sbtn-wrap::before{right:calc(100% + 14px)}
.sbtn-wrap::after{left:calc(100% + 14px)}

.mhint{color:#5a4a30;margin-top:24px;font-size:14px;letter-spacing:4px;font-family:"STFangsong","FangSong",serif;opacity:0;animation:dropIn .6s 2.1s ease-out forwards}
.mhint span{color:#8a6a40}

/* Game over */
#gover{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:80;flex-direction:column;gap:12px}
#gover h1{font-size:44px;text-shadow:0 0 20px rgba(218,165,32,.5)}
#gover .rt{font-size:16px;color:#cba}
</style>
</head>
<body>
<div id="G">
<div class="bg"></div>
<div id="info-bar"><span id="deck-n"></span><span id="turn-n"></span></div>
<div id="ai-area"><div id="ai-info"></div><div id="ai-hand"></div></div>
<div id="center"><div id="play-zone"><span class="lbl">出牌区</span><span id="pz" style="color:#553;font-size:12px">等待出牌...</span></div><div id="log"></div></div>
<div id="pl-area"><div id="pl-hand"></div><div id="pl-ctrl"></div></div>
<div id="overlay"></div>
<div id="gover"></div>
<div id="menu">
  <div id="menu-fall"></div>
  <div id="menu-spark"></div>
  <div class="menu-inner">
    <div class="menu-stamp"><span class="line"></span><span class="seal">汉</span><span class="line"></span></div>
    <div class="title-wrap">
      <h1>三國殺</h1>
      <div class="title-stroke">三國殺</div>
    </div>
    <div class="menu-deco"><span class="swirl">❖</span><span class="sub">乱 世 烽 烟 · 武 将 对 决</span><span class="swirl">❖</span></div>

    <div class="menu-guide">请 · 择 · 一 · 将 · 出 · 征</div>
    <div class="hlist" id="hlist"></div>

    <div class="vs-zone" id="vs-zone">
      <div class="vs-side you" id="vs-you">
        <div class="vs-info"><div class="vs-empty">— 待 选 —</div></div>
        <div class="vs-av" style="font-size:20px;color:#5a4a30">？</div>
      </div>
      <div class="vs-mid"><span class="vs-text">VS</span></div>
      <div class="vs-side foe" id="vs-foe">
        <div class="vs-av">👹</div>
        <div class="vs-info"><div class="vs-name" id="vs-foe-name">？？？</div><div class="vs-title" id="vs-foe-title">敌 将 神 秘</div></div>
      </div>
    </div>

    <div class="sbtn-wrap"><button class="sbtn" id="sbtn" disabled>出 征</button></div>
    <div class="mhint">单 人 模 式 · AI 对 战 · <span>此 游 戏 由 AI 制 作</span></div>
  </div>
</div>
</div>

<script>
// ========== DATA ==========
const HEROES=[
  {id:'liubei',name:'刘备',title:'仁德之主',av:'👑',skill:'仁德',desc:'摸牌多摸1张',hp:4},
  {id:'guanyu',name:'关羽',title:'武圣',av:'⚔️',skill:'武圣',desc:'杀造成2伤害',hp:4},
  {id:'zhaoyun',name:'赵云',title:'常山赵子龙',av:'🐉',skill:'龙胆',desc:'闪可当杀用',hp:4},
  {id:'zhugeliang',name:'诸葛亮',title:'卧龙',av:'🪶',skill:'观星',desc:'摸牌多摸1张',hp:3},
  {id:'sunshangxiang',name:'孙尚香',title:'弓腰姬',av:'🏹',skill:'枭姬',desc:'出杀后摸1牌',hp:3},
  {id:'caocao',name:'曹操',title:'魏武帝',av:'🦅',skill:'奸雄',desc:'受伤后摸2牌',hp:4},
];
const AI_HEROES=[
  {id:'lvbu',name:'吕布',title:'飞将',av:'👹',skill:'无双',desc:'杀需2闪抵消',hp:5},
  {id:'diaochan',name:'貂蝉',title:'绝世舞姬',av:'💃',skill:'离间',desc:'每回合可出2杀',hp:3},
  {id:'zhangfei',name:'张飞',title:'万夫莫敌',av:'🐯',skill:'咆哮',desc:'出杀无限制',hp:4},
  {id:'simayi',name:'司马懿',title:'冢虎',av:'🦊',skill:'反馈',desc:'受伤时对方弃1牌',hp:3},
];
const CT={
  sha:{n:'杀',ic:'⚔️',c:'c-atk',t:'基本'},
  shan:{n:'闪',ic:'🛡️',c:'c-def',t:'基本'},
  tao:{n:'桃',ic:'🍑',c:'c-hea',t:'基本'},
  wuzhong:{n:'无中生有',ic:'📜',c:'c-tri',t:'锦囊'},
  wanjian:{n:'万箭齐发',ic:'🏹',c:'c-aoe',t:'锦囊'},
};

// ========== STATE ==========
let deck,discard,player,ai,phase,turnNum,selected,killUsed;

function makeDeck(){
  const d=[];
  let id=0;
  for(let i=0;i<18;i++) d.push({id:id++,type:'sha'});
  for(let i=0;i<14;i++) d.push({id:id++,type:'shan'});
  for(let i=0;i<8;i++)  d.push({id:id++,type:'tao'});
  for(let i=0;i<5;i++)  d.push({id:id++,type:'wuzhong'});
  for(let i=0;i<3;i++)  d.push({id:id++,type:'wanjian'});
  return shuffle(d);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function draw(who,n){const c=[];for(let i=0;i<n;i++){if(!deck.length){deck=shuffle(discard);discard=[];}if(deck.length){const x=deck.pop();who.hand.push(x);c.push(x);}}return c;}
function removeCard(who,card){const i=who.hand.findIndex(c=>c.id===card.id);if(i>=0) who.hand.splice(i,1);}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}

// ========== RENDER ==========
function render(){
  // AI info
  const ah=ai.hero;
  document.getElementById('ai-info').innerHTML=`<div class="pbox enemy"><div class="pav">${ah.av}</div><div class="pn">${ah.name}</div><div class="pt">${ah.title}</div><div class="hp">${hpPips(ai)}</div><div style="font-size:11px;color:#887">手牌: ${ai.hand.length}</div><div class="sk">${ah.skill}:${ah.desc}</div></div>`;

  // AI hand
  document.getElementById('ai-hand').innerHTML=ai.hand.map(()=>'<div class="cb"></div>').join('');

  // Player hand
  const ph=document.getElementById('pl-hand');
  ph.innerHTML=player.hand.map((c,i)=>{
    const t=CT[c.type];
    let off=false;
    if(phase==='play'){
      if(c.type==='shan' && player.hero.id!=='zhaoyun') off=true;
      if(c.type==='sha' && killUsed && player.hero.id!=='zhangfei') off=true;
    }
    const sel=selected&&selected.id===c.id;
    return `<div class="card ${t.c}${off?' off':''}${sel?' sel':''}" onclick="clickCard(${i})"><div class="ct">${t.t}</div><div class="ci">${t.ic}</div><div class="cn">${t.n}</div></div>`;
  }).join('');

  // Controls
  const ctrl=document.getElementById('pl-ctrl');
  let html='';
  // Player mini portrait
  const p=player.hero;
  html+=`<div class="pbox" style="margin-right:12px;padding:8px"><div style="display:flex;align-items:center;gap:8px"><div class="pav" style="width:45px;height:45px;font-size:22px;border-width:2px">${p.av}</div><div style="text-align:left"><div class="pn" style="font-size:13px">${p.name}</div><div class="hp">${hpPips(player)}</div><div class="sk" style="font-size:9px">${p.skill}</div></div></div></div>`;

  if(phase==='play'){
    const canPlay=selected&&!(()=>{const c=selected;if(c.type==='shan'&&player.hero.id!=='zhaoyun')return true;if(c.type==='sha'&&killUsed&&player.hero.id!=='zhangfei')return true;return false;})();
    html+=`<button class="btn b-atk" id="btn-play"${canPlay?'':' disabled'}>出牌</button>`;
    html+=`<button class="btn b-end" onclick="doEndTurn()">结束回合</button>`;
  } else if(phase==='discard'){
    const ex=player._toDiscard||0;
    html+=`<span style="color:#daa520;font-size:13px">请弃掉 ${ex} 张牌</span>`;
    html+=`<button class="btn b-go" id="btn-disc"${selected?'':' disabled'}>弃牌</button>`;
  }
  ctrl.innerHTML=html;

  // Wire play button
  const bp=document.getElementById('btn-play');
  if(bp) bp.onclick=doPlayCard;
  const bd=document.getElementById('btn-disc');
  if(bd) bd.onclick=doDiscard;

  // Info bar
  document.getElementById('deck-n').textContent='牌堆: '+deck.length+'张';
  document.getElementById('turn-n').textContent=phase==='ai-turn'?'对手回合':'你的回合';
}

function hpPips(who){
  let s='';
  for(let i=0;i<who.hero.hp;i++) s+=`<i${i>=who.hp?' class="x"':''}></i>`;
  return s;
}

function showPlayArea(cards){
  const pz=document.getElementById('pz');
  if(!cards||!cards.length){pz.innerHTML='<span style="color:#553;font-size:12px">等待出牌...</span>';return;}
  pz.innerHTML=cards.map(c=>{
    const t=CT[c.type];
    return `<div class="card ${t.c}" style="cursor:default;width:65px;height:90px"><div class="ct" style="font-size:8px">${t.t}</div><div class="ci" style="font-size:24px">${t.ic}</div><div class="cn" style="font-size:10px">${t.n}</div></div>`;
  }).join('');
}

function log(msg,cls=''){document.getElementById('log').innerHTML+=`<div class="${cls}">${msg}</div>`;document.getElementById('log').scrollTop=99999;}

// ========== GAME FLOW ==========
function startGame(){
  document.getElementById('menu').style.display='none';
  deck=makeDeck(); discard=[]; turnNum=0;
  player={hero:pickedHero,hp:pickedHero.hp,hand:[]};
  const ar=previewFoe||AI_HEROES[Math.floor(Math.random()*AI_HEROES.length)];
  ai={hero:ar,hp:ar.hp,hand:[]};
  draw(player,4); draw(ai,4);
  log('⚔️ 对战开始！','i');
  log(`你: ${player.hero.name} VS ${ai.hero.name}`,'i');
  showPlayArea([]);
  playerTurn();
}

async function playerTurn(){
  turnNum++; killUsed=false; selected=null;
  log(`<br>── 第${turnNum}回合 · 你的回合 ──`,'i');

  // Draw phase
  phase='draw'; render();
  await wait(300);
  let n=2;
  if(player.hero.id==='liubei'||player.hero.id==='zhugeliang') n=3;
  const dc=draw(player,n);
  log(`摸了${dc.length}张牌`);

  phase='play'; selected=null; render();
}

function clickCard(idx){
  selected=player.hand[idx];
  render();
}

async function doPlayCard(){
  if(!selected||phase!=='play') return;
  const c=selected;

  if(c.type==='shan'){
    if(player.hero.id==='zhaoyun'){
      await doAttack(c); // 赵云闪当杀
    }
    return;
  }
  if(c.type==='sha'){
    if(killUsed && player.hero.id!=='zhangfei') return;
    await doAttack(c);
  } else if(c.type==='tao'){
    if(player.hp>=player.hero.hp){log('体力已满');return;}
    await doPeach(c);
  } else if(c.type==='wuzhong'){
    await doWuzhong(c);
  } else if(c.type==='wanjian'){
    await doWanjian(c);
  }
}

async function doAttack(card){
  removeCard(player,card); discard.push(card); killUsed=true;
  showPlayArea([card]);
  log(`你使用了【${CT[card.type].n}】！`,'a');
  selected=null; phase='animating'; render();
  await wait(400);

  // 枭姬
  if(player.hero.id==='sunshangxiang'){draw(player,1);log('枭姬：摸1牌','i');}

  // AI tries to dodge
  let dmg=(player.hero.id==='guanyu')?2:1;
  const needDodge=(ai.hero.id==='lvbu')?2:1;
  let aiShan=ai.hand.filter(c=>c.type==='shan');

  if(aiShan.length>=needDodge){
    for(let i=0;i<needDodge;i++){removeCard(ai,aiShan[i]);discard.push(aiShan[i]);}
    log(`${ai.hero.name} 出了${needDodge}张闪，抵消了攻击！`,'d');
  } else {
    ai.hp=Math.max(0,ai.hp-dmg);
    log(`${ai.hero.name} 未出闪，受到${dmg}点伤害！`,'a');
    // 反馈
    if(ai.hero.id==='simayi' && player.hand.length>0){
      const ri=Math.floor(Math.random()*player.hand.length);
      const rm=player.hand.splice(ri,1)[0]; discard.push(rm);
      log(`反馈：你被弃掉1张【${CT[rm.type].n}】`,'a');
    }
  }
  selected=null; showPlayArea([]); phase='play'; render();
  if(ai.hp<=0) return gameOver(true);
}

async function doPeach(card){
  removeCard(player,card); discard.push(card);
  player.hp=Math.min(player.hp+1,player.hero.hp);
  log('你使用了【桃】，回复1体力 ❤️','p');
  selected=null; showPlayArea([card]); phase='animating'; render();
  await wait(500);
  showPlayArea([]); phase='play'; selected=null; render();
}

async function doWuzhong(card){
  removeCard(player,card); discard.push(card);
  log('你使用了【无中生有】！','i');
  selected=null; showPlayArea([card]); phase='animating'; render();
  await wait(300);
  const dc=draw(player,2);
  log(`摸了${dc.length}张牌`);
  await wait(300);
  showPlayArea([]); phase='play'; selected=null; render();
}

async function doWanjian(card){
  removeCard(player,card); discard.push(card);
  log('你使用了【万箭齐发】！🏹','a');
  selected=null; showPlayArea([card]); phase='animating'; render();
  await wait(400);
  const aiShan=ai.hand.find(c=>c.type==='shan');
  if(aiShan){
    removeCard(ai,aiShan); discard.push(aiShan);
    log(`${ai.hero.name} 出闪抵消`,'d');
  } else {
    ai.hp=Math.max(0,ai.hp-1);
    log(`${ai.hero.name} 受到1点伤害！`,'a');
    if(ai.hero.id==='simayi'&&player.hand.length>0){
      const ri=Math.floor(Math.random()*player.hand.length);
      const rm=player.hand.splice(ri,1)[0]; discard.push(rm);
      log(`反馈：你被弃1牌`,'a');
    }
  }
  showPlayArea([]); phase='play'; selected=null; render();
  if(ai.hp<=0) return gameOver(true);
}

function doEndTurn(){
  selected=null;
  const ex=player.hand.length-player.hp;
  if(ex>0){
    phase='discard';
    player._toDiscard=ex;
    log(`请弃掉${ex}张牌`);
    render();
  } else {
    aiTurn();
  }
}

function doDiscard(){
  if(!selected) return;
  removeCard(player,selected); discard.push(selected);
  player._toDiscard--;
  selected=null;
  log('弃掉1张牌');
  if(player._toDiscard<=0){
    selected=null;
    aiTurn();
  } else {
    selected=null;
    render();
  }
}

// ========== AI TURN ==========
async function aiTurn(){
  log(`<br>── ${ai.hero.name}的回合 ──`,'i');
  phase='ai-turn'; selected=null; render();
  await wait(500);

  // Draw
  draw(ai,2);
  log(`${ai.hero.name} 摸了2张牌`);
  render(); await wait(500);

  // Use peach if low
  for(let i=ai.hand.length-1;i>=0;i--){
    if(ai.hp<=2 && ai.hand[i].type==='tao' && ai.hp<ai.hero.hp){
      const c=ai.hand.splice(i,1)[0]; discard.push(c);
      ai.hp=Math.min(ai.hp+1,ai.hero.hp);
      showPlayArea([c]);
      log(`${ai.hero.name} 使用了桃 ❤️`,'p');
      render(); await wait(500);
    }
  }

  // Use wuzhong
  for(let i=ai.hand.length-1;i>=0;i--){
    if(ai.hand[i].type==='wuzhong'){
      const c=ai.hand.splice(i,1)[0]; discard.push(c);
      showPlayArea([c]);
      log(`${ai.hero.name} 使用了无中生有`,'i');
      render(); await wait(300);
      draw(ai,2);
      log(`${ai.hero.name} 摸了2张牌`);
      render(); await wait(400);
    }
  }

  // Use wanjian
  for(let i=ai.hand.length-1;i>=0;i--){
    if(ai.hand[i].type==='wanjian'){
      const c=ai.hand.splice(i,1)[0]; discard.push(c);
      showPlayArea([c]);
      log(`${ai.hero.name} 使用了万箭齐发！🏹`,'a');
      render(); await wait(400);
      // Player must respond with dodge
      const dodged=await askPlayerDodge(1);
      if(!dodged){
        player.hp=Math.max(0,player.hp-1);
        log('你没有出闪，受到1点伤害！','a');
        if(player.hero.id==='caocao'){draw(player,2);log('奸雄：摸2牌','i');}
        render();
        if(player.hp<=0) return gameOver(false);
      }
      await wait(300);
    }
  }

  // Attack (up to limit)
  const maxAtk=(ai.hero.id==='zhangfei')?99:(ai.hero.id==='diaochan')?2:1;
  let atkCount=0;
  while(atkCount<maxAtk){
    const si=ai.hand.findIndex(c=>c.type==='sha');
    if(si<0) break;
    const c=ai.hand.splice(si,1)[0]; discard.push(c);
    atkCount++;
    showPlayArea([c]);
    const needDodge=(ai.hero.id==='lvbu')?2:1;
    log(`${ai.hero.name} 对你使用了杀！⚔️`,'a');
    render(); await wait(400);

    const dodged=await askPlayerDodge(needDodge);
    if(!dodged){
      player.hp=Math.max(0,player.hp-1);
      log(`你受到了1点伤害！`,'a');
      if(player.hero.id==='caocao'){draw(player,2);log('奸雄：摸2牌','i');}
      render();
      if(player.hp<=0) return gameOver(false);
    }
    await wait(300);
    showPlayArea([]); render();
  }

  // AI discard
  const prio={shan:0,tao:1,wuzhong:2,wanjian:3,sha:4};
  while(ai.hand.length>ai.hp){
    let bi=0,bp=99;
    for(let i=0;i<ai.hand.length;i++){const p=prio[ai.hand[i].type]??5;if(p<bp){bp=p;bi=i;}}
    const c=ai.hand.splice(bi,1)[0]; discard.push(c);
  }

  showPlayArea([]);
  log(`${ai.hero.name} 结束回合`);
  render(); await wait(300);
  playerTurn();
}

// ========== PLAYER RESPONSE ==========
let _dodgeResolve=null, _dodgeNeed=0, _dodgePlayed=0, _dodgeOv=null;

function askPlayerDodge(need){
  return new Promise(resolve=>{
    const shanCount=player.hand.filter(c=>c.type==='shan').length;
    if(shanCount<need){
      resolve(false);
      return;
    }

    phase='response';
    _dodgeResolve=resolve;
    _dodgeNeed=need;
    _dodgePlayed=0;

    // Show overlay with prompt + skip button
    const ov=document.getElementById('overlay');
    ov.style.display='flex';
    ov.innerHTML=`<h2>${need>1?'需要出 '+need+' 张闪！':'请出闪！'}</h2><div class="hint">点击下方手牌中的「闪」来抵消伤害</div><button class="btn b-def" style="margin-top:8px" id="no-dodge">不出（承受伤害）</button>`;
    _dodgeOv=ov;

    document.getElementById('no-dodge').onclick=()=>{
      ov.style.display='none';
      _dodgeResolve=null;
      _dodgeOv=null;
      phase='ai-turn';
      render();
      resolve(false);
    };

    selected=null;
    renderResponse();
  });
}

function renderResponse(){
  // Rebuild only hand cards, NOT controls
  const ph=document.getElementById('pl-hand');
  ph.innerHTML=player.hand.map((c,i)=>{
    const t=CT[c.type];
    const isShan=c.type==='shan';
    const sel=selected&&selected.id===c.id;
    return `<div class="card ${t.c}${isShan?'':' off'}${sel?' sel':''}" onclick="clickDodge(${i})"><div class="ct">${t.t}</div><div class="ci">${t.ic}</div><div class="cn">${t.n}</div></div>`;
  }).join('');
}

function clickDodge(idx){
  const card=player.hand[idx];
  if(card.type!=='shan'||!_dodgeResolve) return;

  selected=card;
  renderResponse();

  removeCard(player,card); discard.push(card);
  _dodgePlayed++;
  selected=null;
  log(`你出了闪 🛡️`,'d');

  if(_dodgePlayed>=_dodgeNeed){
    document.getElementById('overlay').style.display='none';
    const resolve=_dodgeResolve;
    _dodgeResolve=null; _dodgeOv=null;
    phase='ai-turn';
    render();
    resolve(true);
  } else {
    renderResponse();
  }
}

// ========== GAME OVER ==========
function gameOver(win){
  phase='over';
  const g=document.getElementById('gover');
  g.style.display='flex';
  g.innerHTML=`
    <h1 style="color:${win?'#ffd700':'#ff4444'}">${win?'胜利！':'败北...'}</h1>
    <div class="rt">${win?'你击败了'+ai.hero.name+'！':ai.hero.name+'击败了你...'}</div>
    <div class="rt">回合${turnNum} | 你HP:${player.hp} | ${ai.hero.name}HP:${Math.max(0,ai.hp)}</div>
    <button class="sbtn" style="font-size:14px;padding:8px 35px" onclick="location.reload()">再来一局</button>
  `;
  log(win?'🏆 你赢了！':'💀 你输了...',win?'w':'a');
}

// ========== MENU ==========
let pickedHero=null, previewFoe=null;

(function initMenu(){
  // 武将卡（带 hp pip 与角饰）
  const hl=document.getElementById('hlist');
  hl.innerHTML=HEROES.map(h=>{
    const pips=Array(h.hp).fill('<i></i>').join('');
    return `<div class="hcard" onclick="pickH(this,'${h.id}')">
      <span class="corner-tr"></span><span class="corner-bl"></span>
      <div class="av">${h.av}</div>
      <div class="hn">${h.name}</div>
      <div class="ht">${h.title}</div>
      <div class="hs">${h.skill}</div>
      <div class="hp-pip">${pips}</div>
      <div class="hd">${h.desc}</div>
    </div>`;
  }).join('');

  // 随机敌将预览
  previewFoe=AI_HEROES[Math.floor(Math.random()*AI_HEROES.length)];
  const foe=document.getElementById('vs-foe');
  foe.querySelector('.vs-av').textContent=previewFoe.av;
  document.getElementById('vs-foe-name').textContent=previewFoe.name;
  document.getElementById('vs-foe-title').textContent=previewFoe.title;

  // 飘落篆字
  const FALL_CHARS=['汉','魏','蜀','吴','戈','戟','烽','火','计','谋','忠','义','智','勇','仁','武','龙','虎','箭','刀','剑','旌','旗'];
  const fall=document.getElementById('menu-fall');
  for(let i=0;i<22;i++){
    const s=document.createElement('span');
    s.className='fchar';
    s.textContent=FALL_CHARS[Math.floor(Math.random()*FALL_CHARS.length)];
    s.style.left=Math.random()*100+'%';
    s.style.fontSize=(16+Math.random()*22)+'px';
    s.style.animationDuration=(9+Math.random()*9)+'s';
    s.style.animationDelay=(-Math.random()*15)+'s';
    s.style.opacity=(0.3+Math.random()*0.5);
    fall.appendChild(s);
  }

  // 火星
  const spark=document.getElementById('menu-spark');
  for(let i=0;i<28;i++){
    const s=document.createElement('span');
    s.className='spark';
    s.style.left=Math.random()*100+'%';
    s.style.bottom=(-10-Math.random()*40)+'px';
    s.style.setProperty('--dx',(Math.random()*60-30)+'px');
    s.style.animationDuration=(4+Math.random()*5)+'s';
    s.style.animationDelay=(-Math.random()*8)+'s';
    s.style.transform='scale('+(0.5+Math.random()*1.2)+')';
    spark.appendChild(s);
  }
})();

function pickH(el,id){
  pickedHero=HEROES.find(h=>h.id===id);
  document.querySelectorAll('.hcard').forEach(e=>e.classList.remove('pick'));
  el.classList.add('pick');
  document.getElementById('sbtn').disabled=false;

  // 更新左侧对阵
  const you=document.getElementById('vs-you');
  you.innerHTML=`<div class="vs-info"><div class="vs-name">${pickedHero.name}</div><div class="vs-title">${pickedHero.title}</div></div><div class="vs-av" style="font-size:26px">${pickedHero.av}</div>`;
}

document.getElementById('sbtn').onclick=startGame;
</script>
